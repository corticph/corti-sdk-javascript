name: release

on:
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Read metadata
        id: meta
        run: |
          SDK_VERSION=$(jq -r '.sdkVersion' .fern/metadata.json)
          ORIGIN_COMMIT=$(jq -r '.originGitCommit' .fern/metadata.json)
          echo "sdk_version=$SDK_VERSION" >> $GITHUB_OUTPUT
          echo "origin_commit=$ORIGIN_COMMIT" >> $GITHUB_OUTPUT

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          if [[ "$VERSION" == *-* ]]; then
            SUFFIX="${VERSION#*-}"
          else
            SUFFIX=""
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "suffix=$SUFFIX" >> $GITHUB_OUTPUT

      - name: Check if regeneration is needed
        id: regen
        run: |
          if [[ "${{ steps.version.outputs.version }}" == "${{ steps.meta.outputs.sdk_version }}" ]]; then
            echo "needed=false" >> $GITHUB_OUTPUT
            echo "Version matches sdkVersion in metadata — skipping Fern generation"
          else
            echo "needed=true" >> $GITHUB_OUTPUT
            echo "Version mismatch: tag=${{ steps.version.outputs.version }}, metadata=${{ steps.meta.outputs.sdk_version }} — regeneration required"
          fi

      # --- Regeneration path (skipped when version already matches) ---

      - name: Checkout api-specs at originGitCommit
        if: steps.regen.outputs.needed == 'true'
        uses: actions/checkout@v6
        with:
          repository: corticph/api-specs
          ref: ${{ steps.meta.outputs.origin_commit }}
          token: ${{ secrets.CORTI_GITHUB_TOKEN_READ_ALL }}
          path: api-specs

      - name: Install Fern CLI
        if: steps.regen.outputs.needed == 'true'
        run: npm install -g fern-api

      - name: Determine Fern target branch and mode
        if: steps.regen.outputs.needed == 'true'
        id: fern_config
        run: |
          TARGET="${{ github.event.release.target_commitish }}"
          TAG="${{ github.event.release.tag_name }}"
          if [[ "$TARGET" == "main" || "$TARGET" == "master" ]]; then
            # Default branch — Fern creates the PR itself via --mode pull-request
            echo "head_ref=release/${TAG}" >> $GITHUB_OUTPUT
            echo "fern_mode=pull-request" >> $GITHUB_OUTPUT
          else
            # Feature/release branch — push generated code directly onto that branch
            echo "head_ref=$TARGET" >> $GITHUB_OUTPUT
            echo "fern_mode=push" >> $GITHUB_OUTPUT
          fi

      - name: Run Fern generate
        if: steps.regen.outputs.needed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_HEAD_REF: ${{ steps.fern_config.outputs.head_ref }}
        run: |
          cd api-specs
          fern generate --group ts-sdk --version ${{ steps.version.outputs.version }} --mode ${{ steps.fern_config.outputs.fern_mode }} --log-level debug

      - name: Switch to generated branch
        if: steps.regen.outputs.needed == 'true'
        # Fern pushes the generated code to this SDK repo (not api-specs).
        # This step runs at the workspace root (the SDK repo checkout), so git fetch/checkout operate on the right remote.
        run: |
          git fetch origin
          git checkout -B "${{ steps.fern_config.outputs.head_ref }}" "origin/${{ steps.fern_config.outputs.head_ref }}"

      # --- Build, test, publish ---

      - name: Set up node
        uses: actions/setup-node@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Publish to npm
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm config set //registry.npmjs.org/:_authToken ${NPM_TOKEN}
          publish() {  # use latest npm to ensure OIDC support
            npx -y npm@latest publish "$@"
          }
          SUFFIX="${{ steps.version.outputs.suffix }}"
          if [[ -n "$SUFFIX" ]]; then
            publish --access public --tag "$SUFFIX"
          else
            PKG_NAME=$(node -p "require('./package.json').name")
            PKG_VERSION=$(node -p "require('./package.json').version")
            CURRENT_LATEST=$(npm view "${PKG_NAME}" dist-tags.latest 2>/dev/null || echo "0.0.0")
            if npx -y semver "${PKG_VERSION}" -r "<${CURRENT_LATEST}" > /dev/null 2>&1; then
              echo "Publishing ${PKG_VERSION} with --tag backport (current latest is ${CURRENT_LATEST})"
              publish --access public --tag backport
            else
              publish --access public
            fi
          fi
